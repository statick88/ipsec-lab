charon {
    load_modular = no
    # Zero Trust: File logging for audit trail
    filelog {
        /tmp/charon-east.log {
            default = 1
            ike = 2
            knl = 2
            net = 2
            cfg = 2
            time_format = %b %e %T
            append = no
        }
    }
    plugins {
        openssl {
        }
        nonce {
        }
        random {
        }
        socket-default {
            use_broadcast = yes
        }
        kernel-netlink {
        }
        kernel-pfroute {
        }
        kernel-pfkey {
        }
        resolve {
        }
        stroke {
            socket = unix:///var/run/ipsec-ns-east/charon.ctl
        }
        vici {
        }
        xauth-pam {
        }
        eap-identity {
        }
        eap-mschapv2 {
        }
        eap-tls {
        }
        eap-ttls {
        }
        eap-peap {
        }
        xcbc {
        }
        hmac {
        }
        aes {
        }
        sha2 {
        }
        sha1 {
        }
        gcm {
        }
        ccm {
        }
        ctr {
        }
        cmac {
        }
        pbkdf2 {
        }
        fips-prf {
        }
        md5 {
        }
        pkcs1 {
        }
        pkcs8 {
        }
        pkcs12 {
        }
        pem {
        }
        x509 {
        }
        pubkey {
        }
        sshkey {
        }
        revocation {
        }
        constraints {
        }
        acert {
        }
        save-keys {
        }
    }
    pidfile = /var/run/ipsec-ns-east/charon.pid
}
