# strongSwan IPsec configuration file for gw-east (initiator)
# Stroke-based configuration for traditional strongSwan

config setup
    # uniqueids=yes ensures each child SA gets its own ID
    uniqueids=yes

conn %default
    # Authentication method: Pre-Shared Key
    authby=secret
    # IKEv2 key exchange
    keyexchange=ikev2
    # ESP encryption algorithm
    esp=aes256-sha256-modp2048!
    # IKE encryption algorithm
    ike=aes256-sha256-modp2048!
    # Lifetime for IKE SA (8 hours)
    ikelifetime=28800s
    # Lifetime for ESP SA (1 hour)
    lifetime=3600s
    # Margin for rekeying (10 minutes)
    rekeymargin=600s
    # Margintime (5 minutes)
    margintime=300s
    # DPDDelay: Dead Peer Detection delay
    dpddelay=30s
    # DPDTimeout: Dead Peer Detection timeout
    dpdtimeout=150s
    # DPDAction: restart on DPD failure
    dpdaction=restart
    # Auto=add means load but don't start
    auto=add

# Connection between gw-east and gw-west
conn gw-east-to-gw-west
    # Left side (initiator)
    left=10.0.0.1
    leftsubnet=10.10.0.0/24
    leftfirewall=yes
    # Right side (responder)
    right=10.0.0.2
    rightsubnet=10.20.0.0/24
    # Start connection automatically
    auto=start
