# strongSwan IPsec configuration file for gw-west (responder)
# Zero Trust: PSK + X.509 certificate hybrid authentication

config setup
    # uniqueids=yes ensures each child SA gets its own ID
    uniqueids=yes
    # Zero Trust: Enable charon logging for audit trail
    charondebug="ike 2, knl 2, cfg 2, net 2"

conn %default
    # Zero Trust: Hybrid auth — PSK + X.509 certificates
    authby=secret
    # IKEv2 key exchange
    keyexchange=ikev2
    # ESP encryption algorithm
    esp=aes256-sha256-modp2048!
    # IKE encryption algorithm
    ike=aes256-sha256-modp2048!
    # Lifetime for IKE SA (8 hours)
    ikelifetime=28800s
    # Lifetime for ESP SA (1 hour)
    lifetime=3600s
    # Margin for rekeying (10 minutes)
    rekeymargin=600s
    # Margintime (5 minutes)
    margintime=300s
    # Zero Trust: Aggressive DPD for continuous verification
    dpddelay=10s
    # Zero Trust: Short timeout — fail fast
    dpdtimeout=30s
    # Zero Trust: Restart on DPD failure (re-verify)
    dpdaction=restart
    # Auto=add means load but don't start
    auto=add

# Connection between gw-west and gw-east
conn gw-west-to-gw-east
    # Left side (responder, but we define as left)
    left=10.0.0.2
    leftsubnet=10.20.0.0/24
    leftfirewall=yes
    # Right side (initiator)
    right=10.0.0.1
    rightsubnet=10.10.0.0/24
    # Don't start connection automatically (wait for initiator)
    auto=add
