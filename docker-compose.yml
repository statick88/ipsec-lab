# Docker Compose for IPsec Lab — single container approach
# One privileged container runs everything: namespaces, veth, 2x strongSwan

services:
  ipsec-lab:
    image: statick/ipsec-lab:latest
    container_name: ipsec-lab
    privileged: true
    network_mode: host
    volumes:
      - ./wireshark_keys:/wireshark_keys
